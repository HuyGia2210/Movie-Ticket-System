spring.application.name=user-service
server.port=8081
server.address=0.0.0.0

eureka.client.service-url.defaultZone=${EUREKA_URL:http://172.28.50.160:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

secrete.key=${SECRET_KEY}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:172.28.50.160:9092}

app.kafka.topic.user-registered=USER_REGISTERED
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false