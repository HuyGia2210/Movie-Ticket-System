spring.application.name=gateway-server
server.port=8080
server.address=0.0.0.0

eureka.client.service-url.defaultZone=${EUREKA_URL:http://172.28.50.160:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webflux.routes[1].id=movie-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://movie-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/movies/**

spring.cloud.gateway.server.webflux.routes[2].id=booking-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://booking-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/bookings/**
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
